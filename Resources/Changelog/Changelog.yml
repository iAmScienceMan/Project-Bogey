      Message: Fixed missiles orbiting their target after overshooting it
    - Type: Fix
      Message: Fixed fast ships refusing sub-tick move orders
    - Type: Fix
      Message: Fixed HUD text bleeding through tooltips and the engage panel
    - Type: Fix
      Message: Fixed datalink missiles circling a destroyed target's blip
    - Type: Fix
      Message: Fixed a crash when a missile blast destroyed another missile in flight
    - Type: Tweak
      Message: Debug seeker view stops drawing the datum line past the aimpoint
- Id: 11
  Author: iamscienceman
  Time: '2026-07-07T12:00:00.0000000+00:00'
  Changes:
    - Type: Add
      Message: Added an SS14-style lobby with ready-up, round countdown and a unit color slider
    - Type: Add
      Message: Usernames are identity now; joining with a name already on the server is refused
    - Type: Add
      Message: Every player commands their own faction and spawns their own unit at round start
    - Type: Add
      Message: Detected player units show their unit name with the owner in yellow
    - Type: Tweak
      Message: The server freezes completely while empty and only loads the scenario at round start
    - Type: Tweak
      Message: Disconnecting keeps your units; reconnect with the same username to get them back
    - Type: Remove
      Message: Removed singleplayer; the client always connects to a server now
    - Type: Fix
      Message: Fixed missiles refusing to launch after the client/server split
- Id: 12
  Author: iamscienceman
  Time: '2026-07-07T15:00:00.0000000+00:00'
  Changes:
    - Type: Add
      Message: Added an admin system; the server CLI is a real terminal with admin/kick/golobby/speed/ai commands
    - Type: Add
      Message: Added connect, disconnect, status, players, kick, golobby, ai and net_graph console commands
    - Type: Add
      Message: Console now tab-completes commands and holding backspace repeats
    - Type: Tweak
      Message: Sim speed is admin-only now; the HUD speed buttons are gone
    - Type: Tweak
      Message: Restored the full CCVars registry; the server reads sim tuning from cvars
    - Type: Fix
      Message: Fixed the client crashing on unresolvable server addresses
    - Type: Fix
      Message: Menu fields and buttons now stretch to the panel width
