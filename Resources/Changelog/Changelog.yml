    - Type: Add
      Message: Admins get the ground-truth debug overlay back via debugoverlay, with right-click teleport
    - Type: Add
      Message: Added lobbytime, pausetimer and startround commands for controlling the inter-round countdown
    - Type: Add
      Message: Non-admin attempts at admin actions now get told off in the console
    - Type: Tweak
      Message: Disabling AI now freezes AI units completely - no moving, shooting or sensing
    - Type: Tweak
      Message: The changelog is scrollable and shows newest entries first
    - Type: Fix
      Message: Fixed speed set from the server console being wiped when the round started
