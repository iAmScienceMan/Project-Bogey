- Id: 10
  Author: iamscienceman
  Time: '2026-07-03T12:00:00.0000000+00:00'
  Changes:
    - Type: Add
      Message: Added single-target radar locks (STT)
    - Type: Add
      Message: Added salvo selector, lock controls and unit HP to the engage panel, plus HP bars on the map
    - Type: Tweak
      Message: Weapons can be fired at unclassified contacts, less effective off-domain
    - Type: Tweak
      Message: Missiles fly a lead-intercept course and expire on kinetic energy
