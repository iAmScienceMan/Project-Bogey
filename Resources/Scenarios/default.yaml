# The reference engagement. Spawn order here defines the deterministic
# RNG draw order, so keep entries stable if you care about replays.
id: default
name: Meridian Patrol

playerSpawn:
  proto: test-doom
  name: Legion
  position: [0, 0]
  spacingKm: 30

spawns:
  - proto: interceptor
    position: [40, 25]
    velocity: [1.8, 1.1]
  - proto: bomber
    position: [120, -40]
    velocity: [-1.2, 0.3]
  - proto: submersible
    position: [30, 70]
    velocity: [0.2, -0.3]
